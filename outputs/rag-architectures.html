<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Architectures — Knowledge Vault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
      --blue: #58a6ff; --coral: #f78166; --green: #3fb950; --yellow: #d29922; --purple: #bc8cff;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.4rem; }
    nav a:hover { color: var(--accent); }
    nav .sep { color: var(--border); }
    nav .title { color: var(--text); font-weight: 600; font-size: 0.875rem; }
    .tag { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); background: rgba(121,192,255,0.12); padding: 0.2rem 0.55rem; border-radius: 999px; }

    main { flex: 1; max-width: 1060px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.4rem; }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.75rem; line-height: 1.55; }

    /* Card grid */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .arch-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.9rem 1rem; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
    }
    .arch-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .arch-card.active { border-color: var(--card-color, var(--accent)); background: rgba(121,192,255,0.04); }
    .arch-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: var(--card-color, var(--border)); }
    .arch-card .num { font-size: 0.68rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
    .arch-card h3 { font-size: 0.88rem; font-weight: 600; margin-bottom: 3px; }
    .arch-card p { font-size: 0.75rem; color: var(--muted); line-height: 1.4; }
    .arch-card .use-badge { margin-top: 7px; font-size: 0.67rem; padding: 2px 7px; border-radius: 999px; border: 1px solid; width: fit-content; }

    /* Flow panel */
    .flow-panel {
      background: var(--surface); border-radius: 14px; padding: 0; margin-bottom: 1.5rem;
      border: 1px solid var(--border); animation: fadeIn 0.25s ease; overflow: hidden;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .flow-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .flow-title { font-size: 1.15rem; font-weight: 700; }
    .flow-desc { font-size: 0.855rem; color: var(--muted); line-height: 1.58; max-width: 660px; }
    .flow-complexity { text-align: right; }
    .flow-complexity .label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
    .flow-complexity .value { font-size: 0.82rem; font-weight: 600; }

    .svg-wrap { padding: 1rem 1.5rem 1.25rem; }
    svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }

    .use-case-box { margin: 0 1.5rem 1.25rem; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.82rem; }
    .use-case-box strong { color: var(--accent); }

    /* Nav */
    .controls { display: flex; align-items: center; gap: 1rem; }
    .btn { padding: 0.55rem 1.25rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.875rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.4rem; }
    .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
    .kbd { font-size: 0.7rem; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 0.1rem 0.35rem; font-family: monospace; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    Home
  </a>
  <span class="sep">›</span>
  <span class="title">RAG Architectures</span>
  <div style="margin-left:auto"><span class="tag">RAG</span></div>
</nav>

<main>
  <h1>RAG Architectures</h1>
  <p class="subtitle">8 patterns for augmenting LLMs with retrieval — from simple vector search to agentic multi-source orchestration. Click any card to see the flow diagram.</p>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
    <div style="font-size:0.8rem;color:var(--muted)">Click a card · <span class="kbd">←</span> <span class="kbd">→</span> navigate</div>
    <div style="display:flex;align-items:center;gap:12px;font-size:0.75rem;color:var(--muted)">
      <span>Complexity:</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:24px;height:3px;background:var(--green);display:inline-block;border-radius:2px"></span>Low</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:24px;height:3px;background:var(--yellow);display:inline-block;border-radius:2px"></span>Medium</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:24px;height:3px;background:var(--coral);display:inline-block;border-radius:2px"></span>High</span>
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
  <div id="flowPanel"></div>

  <div class="controls">
    <button class="btn" id="prevBtn" disabled onclick="changeArch(-1)">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Prev
    </button>
    <button class="btn btn-primary" id="nextBtn" onclick="changeArch(1)">
      Next
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</main>

<script>
// ── SVG helpers ──────────────────────────────────────────────────────────────
const NS = "http://www.w3.org/2000/svg";
function se(tag, attrs, text) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  if (text !== undefined) el.textContent = text;
  return el;
}
function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)].join(",");
}

// Glow filter
function addDefs(svg, color) {
  const defs = se("defs",{});
  // Arrowhead
  const marker = se("marker",{id:"arr",markerWidth:"8",markerHeight:"6",refX:"8",refY:"3",orient:"auto"});
  const poly = se("polygon",{points:"0 0, 8 3, 0 6", fill: color, opacity:"0.85"});
  marker.appendChild(poly); defs.appendChild(marker);
  // Glow filter
  const f = se("filter",{id:"glow",x:"-40%",y:"-40%",width:"180%",height:"180%"});
  const b = se("feGaussianBlur",{stdDeviation:"3",result:"blur"});
  const m = se("feMerge",{});
  m.appendChild(se("feMergeNode",{in:"blur"}));
  m.appendChild(se("feMergeNode",{in:"SourceGraphic"}));
  f.appendChild(b); f.appendChild(m); defs.appendChild(f);
  svg.appendChild(defs);
}

// Draw a rounded-rect node and return its center
function drawNode(svg, x, y, w, h, label, sublabel, color, glow) {
  const fill = `rgba(${hexRgb(color)},0.12)`;
  const r = se("rect",{x,y,width:w,height:h,rx:"7",
    fill, stroke:color, "stroke-width":"1.5",
    filter: glow ? "url(#glow)" : "none"});
  svg.appendChild(r);
  // Main label
  const ty = sublabel ? y + h/2 - 4 : y + h/2 + 5;
  const t = se("text",{x:x+w/2, y:ty, fill:color,
    "font-size":"11","font-weight":"600","text-anchor":"middle"}, label);
  svg.appendChild(t);
  if (sublabel) {
    const t2 = se("text",{x:x+w/2, y:y+h/2+11, fill:color,
      "font-size":"9","text-anchor":"middle","opacity":"0.75"}, sublabel);
    svg.appendChild(t2);
  }
  return {cx: x + w/2, cy: y + h/2, x, y, w, h};
}

// Draw arrow between two nodes
function arrow(svg, from, to, color, dashed) {
  // Compute edge points
  const dx = to.cx - from.cx, dy = to.cy - from.cy;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ex = from.cx + (dx/len) * (from.w/2 + 2);
  const ey = from.cy + (dy/len) * (from.h/2 + 2);
  const tx = to.cx - (dx/len) * (to.w/2 + 10);
  const ty = to.cy - (dy/len) * (to.h/2 + 2);
  const line = se("line",{x1:ex.toFixed(1),y1:ey.toFixed(1),
    x2:tx.toFixed(1),y2:ty.toFixed(1),
    stroke:color,"stroke-width":"1.5",
    "marker-end":"url(#arr)",opacity:"0.8",
    "stroke-dasharray": dashed ? "5,3" : "none"});
  svg.appendChild(line);
  return {x1:ex,y1:ey,x2:tx,y2:ty};
}

// Animated dot along a path
function animDot(svg, x1,y1,x2,y2, color, dur, delay) {
  const c = se("circle",{r:"4.5",fill:color,opacity:"0.9"});
  const path = `M${x1.toFixed(1)},${y1.toFixed(1)} L${x2.toFixed(1)},${y2.toFixed(1)}`;
  const a = se("animateMotion",{dur,begin:delay,repeatCount:"indefinite",
    calcMode:"linear",keyTimes:"0;1",keyPoints:"0;1",path});
  c.appendChild(a); svg.appendChild(c);
}

// ── Architecture data & render functions ─────────────────────────────────────

const ARCHS = [
  {
    num:"01", name:"Naive RAG", short:"Vector similarity retrieval",
    desc:"Embed the query, find the most similar documents in a vector DB, inject them into the prompt. The baseline approach — fast and simple, great for fact-based queries.",
    use:"Simple fact lookup", complexity:"low", color:"#3fb950",
    render: renderNaive
  },
  {
    num:"02", name:"Multimodal RAG", short:"Cross-modal retrieval",
    desc:"Handles text, images, and audio by embedding and retrieving across modalities. A text query can pull image context using models like CLIP.",
    use:"Images + text context", complexity:"medium", color:"#58a6ff",
    render: renderMultimodal
  },
  {
    num:"03", name:"HyDE", short:"Hypothetical Document Embeddings",
    desc:'Generate a hypothetical answer first, then embed it to retrieve real documents. "Imagine the answer, then find it." Bridges the vocabulary gap between short queries and long docs.',
    use:"Short query, long docs", complexity:"medium", color:"#bc8cff",
    render: renderHyde
  },
  {
    num:"04", name:"Corrective RAG", short:"Validate against trusted sources",
    desc:"Retrieved content is verified against trusted external sources (e.g., web search). Stale or inaccurate context gets corrected before being passed to the LLM.",
    use:"Freshness-critical data", complexity:"medium", color:"#d29922",
    render: renderCorrective
  },
  {
    num:"05", name:"Graph RAG", short:"Knowledge graph retrieval",
    desc:"Converts retrieved content into a knowledge graph of entities and relationships. Provides structured relational context alongside raw text, enabling multi-hop reasoning.",
    use:"Multi-hop reasoning", complexity:"high", color:"#f78166",
    render: renderGraph
  },
  {
    num:"06", name:"Hybrid RAG", short:"Dense + graph retrieval",
    desc:"Combines vector retrieval (unstructured text) with graph retrieval (structured relations). Produces richer answers by leveraging both signal types simultaneously.",
    use:"Structured + unstructured data", complexity:"high", color:"#f78166",
    render: renderHybrid
  },
  {
    num:"07", name:"Adaptive RAG", short:"Route by query complexity",
    desc:"Analyzes the query to decide: simple queries go straight to retrieval, complex queries first go through a multi-step reasoning chain. Reduces unnecessary compute.",
    use:"Mixed simple + complex queries", complexity:"high", color:"#f78166",
    render: renderAdaptive
  },
  {
    num:"08", name:"Agentic RAG", short:"Multi-agent orchestration",
    desc:"AI agents with planning (ReAct/CoT), short-term and long-term memory orchestrate retrieval across multiple sources. The agent decides what to retrieve, when, and from where.",
    use:"Multi-tool / multi-source workflows", complexity:"high", color:"#f78166",
    render: renderAgentic
  }
];

// Shared: linear chain builder
function renderLinearChain(svg, nodes, color, W, H) {
  const nw = 100, nh = 46, gap = 18;
  const total = nodes.length * nw + (nodes.length-1) * gap;
  const startX = (W - total) / 2;
  const midY = H / 2 - nh / 2;
  const rendered = nodes.map((n, i) => {
    const x = startX + i * (nw + gap);
    return drawNode(svg, x, midY, nw, nh, n.label, n.sub||null, color, i===0||i===nodes.length-1);
  });
  for (let i = 0; i < rendered.length - 1; i++) {
    const ed = arrow(svg, rendered[i], rendered[i+1], color);
    animDot(svg, ed.x1, ed.y1, ed.x2, ed.y2, color, "1.4s", `${i*0.28}s`);
  }
  return rendered;
}

function renderNaive(svg, color) {
  const W=860, H=180;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nodes = [
    {label:"User Query"},{label:"Embedding"},{label:"Vector DB"},{label:"Prompt"},{label:"LLM"},{label:"Output"}
  ];
  renderLinearChain(svg, nodes, color, W, H);
}

function renderMultimodal(svg, color) {
  const W=860, H=180;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nodes = [
    {label:"User Query"},{label:"Embedding"},{label:"Multimodal DB",sub:"text · image · audio"},{label:"Prompt"},{label:"LLM"},{label:"Output"}
  ];
  renderLinearChain(svg, nodes, color, W, H);
}

function renderHyde(svg, color) {
  const W=860, H=180;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nodes = [
    {label:"User Query"},{label:"Hypothetical\nAnswer",sub:"generator"},{label:"Embedding"},{label:"Vector DB"},{label:"Prompt"},{label:"LLM"},{label:"Output"}
  ];
  const nw=100, nh=46, gap=10;
  const total = nodes.length*nw + (nodes.length-1)*gap;
  const startX = (W-total)/2, midY = H/2-nh/2;
  const rendered = nodes.map((n,i) => {
    const lbl = n.label.replace(/\\n/g,"\n");
    const lines = lbl.split("\n");
    const x = startX + i*(nw+gap);
    const nd = drawNode(svg,x,midY,nw,nh,lines[0],n.sub||null,color, i===0||i===nodes.length-1);
    return nd;
  });
  for (let i=0;i<rendered.length-1;i++) {
    const ed = arrow(svg,rendered[i],rendered[i+1],color);
    animDot(svg,ed.x1,ed.y1,ed.x2,ed.y2,color,"1.5s",`${i*0.22}s`);
  }
}

function renderCorrective(svg, color) {
  const W=860, H=220;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nw=100, nh=44, gap=14;

  // Main linear chain (top row)
  const mainNodes = ["User Query","Embedding","Analyzer","Prompt","LLM","Output"];
  const total = mainNodes.length*nw + (mainNodes.length-1)*gap;
  const startX = (W-total)/2, topY = 40;
  const rendered = mainNodes.map((lbl,i) => drawNode(svg, startX+i*(nw+gap), topY, nw, nh, lbl, null, color, i===0||i===mainNodes.length-1));

  for (let i=0;i<rendered.length-1;i++) {
    const ed = arrow(svg,rendered[i],rendered[i+1],color);
    animDot(svg,ed.x1,ed.y1,ed.x2,ed.y2,color,"1.4s",`${i*0.25}s`);
  }

  // Web search node below Analyzer
  const analNode = rendered[2];
  const webNode = drawNode(svg, analNode.x, analNode.y+84, nw, nh, "Web Search", "verify", color, false);
  // Down arrow from Analyzer to Web
  const d1 = se("line",{x1:analNode.cx, y1:analNode.y+nh, x2:webNode.cx, y2:webNode.y,
    stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8","stroke-dasharray":"5,3"});
  svg.appendChild(d1);
  animDot(svg, analNode.cx, analNode.y+nh+2, webNode.cx, webNode.y-2, color, "1.6s", "0.6s");
  // Up arrow back
  const d2 = se("line",{x1:webNode.cx+12, y1:webNode.y, x2:analNode.cx+12, y2:analNode.y+nh,
    stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.5","stroke-dasharray":"4,4"});
  svg.appendChild(d2);

  svg.appendChild(se("text",{x:webNode.cx+nw/2+6, y:webNode.cy+4,
    fill:color,"font-size":"9","opacity":"0.7"}, "corrected info"));
}

function renderGraph(svg, color) {
  const W=860, H=220;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nw=100, nh=44, gap=14;

  // Linear: Query → GraphGen → ... → Prompt → LLM → Output
  // GraphGen fans to GraphDB and VectorDB
  const top = ["User Query","Graph Gen","Prompt","LLM","Output"];
  const total = top.length*nw + (top.length-1)*(gap+20);
  const startX = (W-total)/2 + 20, topY = 50;
  const rendered = top.map((lbl,i) => drawNode(svg,startX+i*(nw+gap+20),topY,nw,nh,lbl,null,color,i===0||i===top.length-1));

  // Arrow Q→GraphGen, GraphGen will branch, then merge at Prompt
  const ed0 = arrow(svg,rendered[0],rendered[1],color);
  animDot(svg,ed0.x1,ed0.y1,ed0.x2,ed0.y2,color,"1.3s","0s");

  // GraphDB and VectorDB below GraphGen
  const gg = rendered[1];
  const prompt = rendered[2];
  const midX = (gg.cx + prompt.cx) / 2;

  const graphDb = drawNode(svg, midX - nw - 10, topY + 90, nw, nh, "Graph DB", null, color, false);
  const vecDb   = drawNode(svg, midX + 10, topY + 90, nw, nh, "Vector DB", null, color, false);

  // Arrows: GraphGen → GraphDB, GraphGen → VectorDB
  [graphDb, vecDb].forEach((db, i) => {
    const dx = db.cx - gg.cx, dy = db.cy - gg.cy;
    const len = Math.sqrt(dx*dx+dy*dy);
    const x1 = gg.cx + (dx/len)*(gg.w/2);
    const y1 = gg.cy + (dy/len)*(gg.h/2);
    const x2 = db.cx - (dx/len)*(db.w/2+10);
    const y2 = db.cy - (dy/len)*(db.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8"}));
    animDot(svg,x1,y1,x2,y2,color,"1.5s",`${0.3+i*0.3}s`);
  });

  // Arrows: GraphDB → Prompt, VectorDB → Prompt
  [graphDb, vecDb].forEach((db, i) => {
    const dx = prompt.cx - db.cx, dy = prompt.cy - db.cy;
    const len = Math.sqrt(dx*dx+dy*dy);
    const x1 = db.cx + (dx/len)*(db.w/2);
    const y1 = db.cy + (dy/len)*(db.h/2);
    const x2 = prompt.cx - (dx/len)*(prompt.w/2+10);
    const y2 = prompt.cy - (dy/len)*(prompt.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8"}));
    animDot(svg,x1,y1,x2,y2,color,"1.5s",`${0.9+i*0.2}s`);
  });

  // Prompt → LLM → Output
  for (let i=2;i<rendered.length-1;i++) {
    const ed = arrow(svg,rendered[i],rendered[i+1],color);
    animDot(svg,ed.x1,ed.y1,ed.x2,ed.y2,color,"1.3s",`${1.4+i*0.2}s`);
  }
}

function renderHybrid(svg, color) {
  const W=860, H=240;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nw=100, nh=44;

  // Left: Query → Embedding
  const qNode  = drawNode(svg, 60, 98, nw, nh, "User Query", null, color, true);
  const emb    = drawNode(svg, 200, 98, nw, nh, "Embedding", null, color, false);
  const ed1 = arrow(svg,qNode,emb,color);
  animDot(svg,ed1.x1,ed1.y1,ed1.x2,ed1.y2,color,"1.3s","0s");

  // Two branches: VectorDB (top) and GraphDB (bottom)
  const vecDb  = drawNode(svg, 340, 48, nw, nh, "Vector DB", "context 1", color, false);
  const graphDb= drawNode(svg, 340, 148, nw, nh, "Graph DB", "context 2", color, false);

  [[vecDb,0.2],[graphDb,0.45]].forEach(([db,delay]) => {
    const dx=db.cx-emb.cx, dy=db.cy-emb.cy, len=Math.sqrt(dx*dx+dy*dy);
    const x1=emb.cx+(dx/len)*(emb.w/2), y1=emb.cy+(dy/len)*(emb.h/2);
    const x2=db.cx-(dx/len)*(db.w/2+10), y2=db.cy-(dy/len)*(db.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8"}));
    animDot(svg,x1,y1,x2,y2,color,"1.4s",`${delay}s`);
  });

  // Merge node
  const merge  = drawNode(svg, 490, 98, nw, nh, "Merge +\nPrompt", null, color, false);
  [[vecDb,0.6],[graphDb,0.8]].forEach(([db,delay]) => {
    const dx=merge.cx-db.cx, dy=merge.cy-db.cy, len=Math.sqrt(dx*dx+dy*dy);
    const x1=db.cx+(dx/len)*(db.w/2), y1=db.cy+(dy/len)*(db.h/2);
    const x2=merge.cx-(dx/len)*(merge.w/2+10), y2=merge.cy-(dy/len)*(merge.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8"}));
    animDot(svg,x1,y1,x2,y2,color,"1.4s",`${delay}s`);
  });

  // Merge → LLM → Output
  const llm    = drawNode(svg, 640, 98, nw, nh, "LLM", null, color, false);
  const out    = drawNode(svg, 760, 98, nw, nh, "Output", null, color, true);
  [merge,llm].forEach((n,i) => {
    const next = [llm,out][i];
    const ed = arrow(svg,n,next,color);
    animDot(svg,ed.x1,ed.y1,ed.x2,ed.y2,color,"1.3s",`${1.0+i*0.3}s`);
  });

  // GraphGen node below Embedding feeding GraphDB
  const gg = drawNode(svg, 340, 198, nw, nh, "Graph Gen", null, color, false);
  const dx2=gg.cx-emb.cx, dy2=gg.cy-emb.cy, len2=Math.sqrt(dx2*dx2+dy2*dy2);
  const gx1=emb.cx+(dx2/len2)*(emb.w/2), gy1=emb.cy+(dy2/len2)*(emb.h/2);
  const gx2=gg.cx-(dx2/len2)*(gg.w/2+10), gy2=gg.cy-(dy2/len2)*(gg.h/2);
  svg.appendChild(se("line",{x1:gx1.toFixed(1),y1:gy1.toFixed(1),x2:gx2.toFixed(1),y2:gy2.toFixed(1),
    stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.6","stroke-dasharray":"4,3"}));
  animDot(svg,gx1,gy1,gx2,gy2,color,"1.5s","0.35s");
  // GraphGen → GraphDB
  const edd = arrow(svg,gg,graphDb,color);
  animDot(svg,edd.x1,edd.y1,edd.x2,edd.y2,color,"1.5s","0.55s");
}

function renderAdaptive(svg, color) {
  const W=860, H=240;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nw=108, nh=44;

  const query   = drawNode(svg, 30, 98, nw, nh, "User Query", null, color, true);
  const analyzer= drawNode(svg, 180, 98, nw, nh, "Query\nAnalyzer", null, color, false);
  const ed0 = arrow(svg,query,analyzer,color);
  animDot(svg,ed0.x1,ed0.y1,ed0.x2,ed0.y2,color,"1.3s","0s");

  // Two branches
  const direct  = drawNode(svg, 340, 48, nw, nh, "Direct", "simple query", color, false);
  const reason  = drawNode(svg, 340, 150, nw, nh, "Reasoning\nChain", "complex", color, false);
  [[direct,"0.25s"],[reason,"0.45s"]].forEach(([n,d]) => {
    const dx=n.cx-analyzer.cx, dy=n.cy-analyzer.cy, len=Math.sqrt(dx*dx+dy*dy);
    const x1=analyzer.cx+(dx/len)*(analyzer.w/2), y1=analyzer.cy+(dy/len)*(analyzer.h/2);
    const x2=n.cx-(dx/len)*(n.w/2+10), y2=n.cy-(dy/len)*(n.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8"}));
    animDot(svg,x1,y1,x2,y2,color,"1.4s",d);
  });

  // Both merge into VectorDB
  const vecDb   = drawNode(svg, 500, 98, nw, nh, "Vector DB", null, color, false);
  [[direct,"0.7s"],[reason,"0.9s"]].forEach(([n,d]) => {
    const dx=vecDb.cx-n.cx, dy=vecDb.cy-n.cy, len=Math.sqrt(dx*dx+dy*dy);
    const x1=n.cx+(dx/len)*(n.w/2), y1=n.cy+(dy/len)*(n.h/2);
    const x2=vecDb.cx-(dx/len)*(vecDb.w/2+10), y2=vecDb.cy-(dy/len)*(vecDb.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8"}));
    animDot(svg,x1,y1,x2,y2,color,"1.4s",d);
  });

  const llm     = drawNode(svg, 660, 98, nw, nh, "LLM", null, color, false);
  const out     = drawNode(svg, 780, 98, nw, nh, "Output", null, color, true);
  [[vecDb,llm,"1.1s"],[llm,out,"1.4s"]].forEach(([a,b,d]) => {
    const ed = arrow(svg,a,b,color);
    animDot(svg,ed.x1,ed.y1,ed.x2,ed.y2,color,"1.3s",d);
  });
}

function renderAgentic(svg, color) {
  const W=860, H=260;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  addDefs(svg, color);
  const nw=108, nh=44;

  const query   = drawNode(svg, 20, 108, nw, nh, "Query", null, color, true);
  const agent   = drawNode(svg, 175, 108, nw+10, nh, "Agent", "ReAct / CoT", color, true);
  const ed0 = arrow(svg,query,agent,color);
  animDot(svg,ed0.x1,ed0.y1,ed0.x2,ed0.y2,color,"1.3s","0s");

  // Memory below agent
  const mem     = drawNode(svg, 175, 200, nw+10, nh, "Memory", "ST + LT", color, false);
  svg.appendChild(se("line",{x1:agent.cx,y1:agent.y+nh,x2:mem.cx,y2:mem.y,
    stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.6","stroke-dasharray":"5,3"}));
  animDot(svg,agent.cx,agent.y+nh+2,mem.cx,mem.y-2,color,"1.6s","0.3s");

  // Agent 1 and Agent 2
  const ag1     = drawNode(svg, 350, 58, nw, nh, "Agent 1", "search", color, false);
  const ag2     = drawNode(svg, 350, 158, nw, nh, "Agent 2", "compute", color, false);
  [[ag1,"0.25s"],[ag2,"0.45s"]].forEach(([n,d]) => {
    const dx=n.cx-agent.cx, dy=n.cy-agent.cy, len=Math.sqrt(dx*dx+dy*dy);
    const x1=agent.cx+(dx/len)*(agent.w/2), y1=agent.cy+(dy/len)*(agent.h/2);
    const x2=n.cx-(dx/len)*(n.w/2+10), y2=n.cy-(dy/len)*(n.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.8"}));
    animDot(svg,x1,y1,x2,y2,color,"1.4s",d);
  });

  // Sources col: MCP, Web, Cloud
  const mcp     = drawNode(svg, 520, 40, nw, nh, "MCP Servers", null, color, false);
  const web     = drawNode(svg, 520, 108, nw, nh, "Web / Local", null, color, false);
  const cloud   = drawNode(svg, 520, 176, nw, nh, "Cloud", "AWS / GCP", color, false);
  // ag1 → MCP, ag1 → Web; ag2 → Web, ag2 → Cloud
  [[ag1,mcp,"0.6s"],[ag1,web,"0.75s"],[ag2,web,"0.8s"],[ag2,cloud,"0.95s"]].forEach(([a,b,d]) => {
    const dx=b.cx-a.cx, dy=b.cy-a.cy, len=Math.sqrt(dx*dx+dy*dy);
    const x1=a.cx+(dx/len)*(a.w/2), y1=a.cy+(dy/len)*(a.h/2);
    const x2=b.cx-(dx/len)*(b.w/2+10), y2=b.cy-(dy/len)*(b.h/2);
    svg.appendChild(se("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),
      stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.7"}));
    animDot(svg,x1,y1,x2,y2,color,"1.5s",d);
  });

  // Output node
  const out     = drawNode(svg, 730, 108, nw, nh, "Output", null, color, true);
  // agent → out (after processing)
  svg.appendChild(se("line",{x1:(agent.cx+agent.w/2+20).toFixed(1), y1:agent.cy.toFixed(1),
    x2:(out.cx-out.w/2-10).toFixed(1), y2:out.cy.toFixed(1),
    stroke:color,"stroke-width":"1.5","marker-end":"url(#arr)",opacity:"0.5","stroke-dasharray":"5,3"}));
  animDot(svg, agent.cx+agent.w/2+20, agent.cy, out.cx-out.w/2-10, out.cy, color,"2.0s","1.2s");
}

// ── UI logic ─────────────────────────────────────────────────────────────────

let currentIdx = 0;

function complexityColor(c) {
  return c === "low" ? "#3fb950" : c === "medium" ? "#d29922" : "#f78166";
}

function renderCards() {
  document.getElementById("cardsGrid").innerHTML = ARCHS.map((a,i) => `
    <div class="arch-card ${i===currentIdx?'active':''}" onclick="selectArch(${i})"
      style="--card-color:${a.color}">
      <div class="num">${a.num}</div>
      <h3 style="color:${i===currentIdx?a.color:'var(--text)'}">${a.name}</h3>
      <p>${a.short}</p>
      <div class="use-badge" style="color:${complexityColor(a.complexity)};border-color:${complexityColor(a.complexity)}40;background:${complexityColor(a.complexity)}10">
        ${a.use}
      </div>
    </div>
  `).join("");
}

function renderFlow() {
  const a = ARCHS[currentIdx];
  const panel = document.getElementById("flowPanel");

  // Build SVG
  const svgEl2 = document.createElementNS(NS, "svg");
  svgEl2.setAttribute("width","100%");
  svgEl2.style.display = "block";
  a.render(svgEl2, a.color);

  panel.innerHTML = "";
  const fp = document.createElement("div"); fp.className = "flow-panel";

  const fh = document.createElement("div"); fh.className = "flow-header";
  const left = document.createElement("div");
  left.innerHTML = `<div style="font-size:0.7rem;color:var(--muted);margin-bottom:3px">${a.num} / 08</div>
    <div class="flow-title" style="color:${a.color}">${a.name}</div>
    <div class="flow-desc">${a.desc}</div>`;
  const right = document.createElement("div"); right.className = "flow-complexity";
  right.innerHTML = `<div class="label" style="color:${complexityColor(a.complexity)}">Complexity</div>
    <div class="value" style="color:${complexityColor(a.complexity)}">${a.complexity}</div>`;
  fh.appendChild(left); fh.appendChild(right); fp.appendChild(fh);

  const wrap = document.createElement("div"); wrap.className = "svg-wrap";
  wrap.appendChild(svgEl2); fp.appendChild(wrap);

  const uc = document.createElement("div"); uc.className = "use-case-box";
  uc.innerHTML = `<strong>Best for:</strong> ${a.use}`;
  fp.appendChild(uc);

  panel.appendChild(fp);
}

function selectArch(i) {
  currentIdx = i;
  renderCards();
  renderFlow();
  document.getElementById("prevBtn").disabled = currentIdx === 0;
  document.getElementById("nextBtn").disabled = currentIdx === ARCHS.length - 1;
}

function changeArch(delta) {
  selectArch(Math.max(0, Math.min(ARCHS.length - 1, currentIdx + delta)));
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") changeArch(1);
  if (e.key === "ArrowLeft") changeArch(-1);
});

selectArch(0);
</script>
